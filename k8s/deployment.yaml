apiVersion: apps/v1
kind: Deployment
metadata:
  name: diet-analysis-deployment
  namespace: default
  labels:
    app: diet-analysis-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diet-analysis-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: diet-analysis-service
        # Istio sidecar manual trigger if namespace auto-injection is not configured
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: diet-analysis-service
        image: username/diet-analysis-service:latest # Replace with your dockerhub username
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: diet-analysis-service
  namespace: default
  labels:
    app: diet-analysis-service
spec:
  ports:
  - port: 8082
    targetPort: 8082
    protocol: TCP
    name: http
  selector:
    app: diet-analysis-service
  type: ClusterIP
